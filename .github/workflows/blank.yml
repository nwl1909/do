name: Sync VPN Configs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download configibf (private repo)
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/nwl1909/internetbetterfree/contents/configibf" \
            -o configibf

      - name: Download configibf2 (private repo)
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/nwl1909/internetbetterfree/contents/configibf2" \
            -o configibf2

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add configibf configibf2

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Sync configs"
          git push

name: Sync VPN Configs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download configibf
        run: curl -L https://raw.githubusercontent.com/nwl1909/internetbetterfree/main/configibf -o configibf

      - name: Download configibf2
        run: curl -L https://raw.githubusercontent.com/nwl1909/internetbetterfree/main/configibf2 -o configibf2

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add configibf configibf2

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Sync configs"
          git push

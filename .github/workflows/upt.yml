name: VPN Config Update Notification

on:
  push:
    branches:
      - main
    paths:
      - 'configibf'
      - 'configibf2'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="@internetbetterfree" \
            -d text="🔔 Обновлён VPN конфиг. Обновите клиент."

name: VPN Config Update Notification

on:
  push:
    paths:
      - 'configs/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d chat_id="@internetbetterfree" \
          -d text="🔔 Доступно новое обновление.

Пожалуйста, обновите конфиг в вашем VPN-клиенте."

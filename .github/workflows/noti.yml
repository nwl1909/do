name: Notify Telegram on Config Change

on:
  push:
    branches:
      - main
    paths:
      - 'configibf'
      - 'configibf2'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # нужно для сравнения с предыдущим коммитом

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(configibf|configibf2)$' | tr '\n' ', ' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        if: steps.changes.outputs.files != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CHANGED_FILES="${{ steps.changes.outputs.files }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="https://github.com/$REPO/commit/$COMMIT_SHA"

          MESSAGE="🔔 *Обновление конфигурации*

📁 *Файлы:* \`$CHANGED_FILES\`
👤 *Автор:* $AUTHOR
🌿 *Ветка:* \`$BRANCH\`
💬 *Коммит:* \`$COMMIT_SHORT\` — $COMMIT_MSG
🔗 [Посмотреть изменения]($RUN_URL)"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            -d text="$MESSAGE"

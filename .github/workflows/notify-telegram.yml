name: Notify Telegram on Config Change

on:
  push:
    branches:
      - main
    paths:
      - 'configibf'
      - 'configibf2'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(configibf|configibf2)$' | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        if: steps.changes.outputs.files != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🔔 Доступно новое обновление. Пожалуйста, обновите конфиг в вашем VPN-клиенте."
